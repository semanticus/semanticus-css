<!DOCTYPE html>
<html lang="en" data-theme="">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light dark">
  <link rel="stylesheet" href="__SEMANTICUS_BASE__semanticus.css">
  <!-- PALETTE_CSS -->
  <!-- SIZE_CSS -->
  <style>
    body {
      padding-left: 1rem;
      padding-right: 1rem;
    }
  </style>
</head>
<body>
  <main class="container-fluid">
    <br>

    <h4>BUTTONS</h4>
    <section role="toolbar">
      <button>Primary</button>
      <button class="secondary">Secondary</button>
      <button class="contrast">Contrast</button>
      <button disabled>Disabled</button>
    </section>
    <hr>

    <h4>LINKS</h4>
    <section role="group">
      <a href="#">Primary</a>
      <a href="#" aria-current="page">Active</a>
      <a href="#" class="secondary">Secondary</a>
      <a href="#" class="contrast">Contrast</a>
    </section>

    <hr>

    <h4>FORM ELEMENTS</h4>
    <section>
      <form>
        <div role="toolbar">
          <fieldset>
            <label>Text</label>
            <input type="text" placeholder="Enter text..." />
          </fieldset>
          <fieldset>
            <label>Select</label>
            <select>
              <option>Option 1</option>
              <option>Option 2</option>
              <option>Option 3</option>
            </select>
          </fieldset>
        </div>

        <fieldset>
          <label>Dropdown group</label>
          <fieldset role="group">
            <details class="w-100">
              <summary aria-haspopup="menu">select an option...</summary>
              <ul role="menu">
                <li><a role="menuitem" href="#">option 1</a></li>
                <li><a role="menuitem" href="#">option 2</a></li>
              </ul>
            </details>
            <input type="submit" value="Order">
          </fieldset>
        </fieldset>

        <fieldset role="toolbar">
          <fieldset>
            <label>Checkbox</label>
            <div role="toolbar">
              <label><input type="checkbox" checked /> Checked</label>
              <label><input type="checkbox" /> Unchecked</label>
            </div>
          </fieldset>
          <fieldset>
            <label>Radio</label>
            <div role="toolbar">
              <label><input type="radio" name="radio" checked /> Option A</label>
              <label><input type="radio" name="radio" /> Option B</label>
            </div>
          </fieldset>
        </fieldset>
      </form>
    </section>

    <hr>

    <h4>CARDS</h4>
    <section>
      <article class="card">
        <hgroup>
          <h2>Card title</h2>
          <p>description</p>
        </hgroup>
        <p>This is a sample card component styled with the <!-- PALETTE_NAME --> palette. It demonstrates the palette's card background, border, and text colors.</p>
        <footer>
          <a href="#!" role="button" aria-label="Close">Cancel</a>&nbsp;
          <a href="#!" role="button">Save</a>
        </footer>
      </article>
    </section>
  </main>
</body>
</html>
