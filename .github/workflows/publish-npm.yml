name: Publish to npm

on:
  release:
    types:
      - published

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify release tag matches package version
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
            PACKAGE_VERSION="$(node -p 'require("./package.json").version')"
            if [ "$RELEASE_TAG" != "v$PACKAGE_VERSION" ] && [ "$RELEASE_TAG" != "$PACKAGE_VERSION" ]; then
              echo "Release tag '$RELEASE_TAG' does not match package version '$PACKAGE_VERSION'." >&2
              exit 1
            fi

      - name: Lint
        run: npm run lint

      - name: Publish package
        run: npm publish --access public --provenance

      - name: Prepare target branch
        id: prepare-target-branch
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          PACKAGE_VERSION: ${{ github.event.release.tag_name }}
          TARGET_COMMITISH: ${{ github.event.release.target_commitish }}
        run: |
            TARGET_BRANCH="$TARGET_COMMITISH"
            if printf '%s' "$TARGET_BRANCH" | grep -Eq '^[0-9a-f]{40}$'; then
              TARGET_BRANCH="$DEFAULT_BRANCH"
            fi

            CLEAN_VERSION="${PACKAGE_VERSION#v}"

            git fetch origin "$TARGET_BRANCH"
            git switch --create "$TARGET_BRANCH" --track "origin/$TARGET_BRANCH"

            echo "target_branch=$TARGET_BRANCH" >> "$GITHUB_OUTPUT"
            echo "package_version=$CLEAN_VERSION" >> "$GITHUB_OUTPUT"

      - name: Update versioned CDN URLs
        env:
          SEMANTICUS_CDN_VERSION: ${{ steps.prepare-target-branch.outputs.package_version }}
        run: npm run release:update-cdn-urls

      - name: Commit updated CDN URLs
        env:
          PACKAGE_VERSION: ${{ steps.prepare-target-branch.outputs.package_version }}
          TARGET_BRANCH: ${{ steps.prepare-target-branch.outputs.target_branch }}
        run: |
            if git diff --quiet; then
              echo "No CDN URL updates to commit."
              exit 0
            fi

            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add README.md docs scripts/update-cdn-urls.js package.json
            git commit -m "docs: update CDN URLs for v$PACKAGE_VERSION"
            git push origin "HEAD:$TARGET_BRANCH"
